# Сканер: USB‑UART на Linux обычно /dev/ttyUSB0 или /dev/ttyACM0.
# Задайте путь на хосте и в контейнере одной переменной:
#   SCANNER_DEVICE=/dev/ttyACM0 docker compose up
services:
  scanner:
    build: .
    container_name: scanner-old
    restart: unless-stopped
    environment:
      SERIAL_PORT: ${SCANNER_DEVICE:-/dev/ttyUSB0}
      # API на машине-хосте (Docker Desktop / Linux с host-gateway)
      API_URL: ${API_URL:-http://host.docker.internal:8000/api/endpoint}
    devices:
      - "${SCANNER_DEVICE:-/dev/ttyUSB0}:${SCANNER_DEVICE:-/dev/ttyUSB0}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
